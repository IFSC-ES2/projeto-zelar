components:
  parameters:
    IdParam:
      in: path
      name: id
      required: true
      schema:
        type: integer
      description: Identificador do registro.
  responses:
    NotFound:
      description: Registro nao encontrado.
    ValidationError:
      description: Dados invalidos.
    Conflict:
      description: Conflito com regra de negocio ou unicidade.
    NoContent:
      description: Operacao concluida sem corpo de resposta.
  schemas:
    Error:
      type: object
      properties:
        error:
          type: string
    GenericRecord:
      type: object
      additionalProperties: true

/api/ambientes:
  get:
    tags: [Ambientes]
    summary: Lista ambientes ativos.
    responses:
      200:
        description: Lista de ambientes.
  post:
    tags: [Ambientes]
    summary: Cria ambiente.
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/GenericRecord"
    responses:
      201:
        description: Ambiente criado.
      400:
        $ref: "#/components/responses/ValidationError"
      409:
        $ref: "#/components/responses/Conflict"
/api/ambientes/deletados:
  get:
    tags: [Ambientes]
    summary: Lista ambientes deletados.
    responses:
      200:
        description: Lista de ambientes deletados.
/api/ambientes/{id}:
  get:
    tags: [Ambientes]
    summary: Busca ambiente por ID.
    parameters:
      - $ref: "#/components/parameters/IdParam"
    responses:
      200:
        description: Ambiente encontrado.
      404:
        $ref: "#/components/responses/NotFound"
  put:
    tags: [Ambientes]
    summary: Atualiza ambiente.
    parameters:
      - $ref: "#/components/parameters/IdParam"
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/GenericRecord"
    responses:
      200:
        description: Ambiente atualizado.
      400:
        $ref: "#/components/responses/ValidationError"
      404:
        $ref: "#/components/responses/NotFound"
  delete:
    tags: [Ambientes]
    summary: Remove ambiente.
    parameters:
      - $ref: "#/components/parameters/IdParam"
    responses:
      204:
        $ref: "#/components/responses/NoContent"
      404:
        $ref: "#/components/responses/NotFound"
      409:
        $ref: "#/components/responses/Conflict"
/api/ambientes/{id}/restaurar:
  patch:
    tags: [Ambientes]
    summary: Restaura ambiente deletado.
    parameters:
      - $ref: "#/components/parameters/IdParam"
    responses:
      200:
        description: Ambiente restaurado.
      404:
        $ref: "#/components/responses/NotFound"

