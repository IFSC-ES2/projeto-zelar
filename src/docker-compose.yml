services:
  db:
    image: postgres:17
    environment:
      POSTGRES_DB: zelar
      POSTGRES_USER: zelar
      POSTGRES_PASSWORD: zelar
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
      - ./db/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
      - ./db/seed.sql:/docker-entrypoint-initdb.d/02-seed.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U zelar -d zelar"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  db_data:
